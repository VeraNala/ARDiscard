name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          mkdir -p ~/.dalamud
          curl -sL https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -o /tmp/dalamud.zip
          unzip -o /tmp/dalamud.zip -d ~/.dalamud

      - name: Restore
        run: dotnet restore ARDiscard/ARDiscard.csproj -p:Configuration=Release

      - name: Build
        run: dotnet build ARDiscard/ARDiscard.csproj -c Release -f net10.0-windows -p:DalamudLibPath=$HOME/.dalamud/ -maxcpucount:1 --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ARDiscard
          path: ARDiscard/dist/
